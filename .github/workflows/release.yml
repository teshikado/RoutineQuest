name: Release Desktop Installers

# Builds the Windows installer (RoutineQuest-Setup.exe) and two macOS
# installers — RoutineQuest-macOS-Apple-Silicon.dmg (arm64) and
# RoutineQuest-macOS-Intel.dmg (x64) — and publishes all three to a single
# GitHub Release matching the pushed tag. Push a tag like `v1.1.0` to
# trigger it:
#
#   git tag v1.1.0
#   git push origin v1.1.0
#
# Each platform only *builds* here (electron-builder, no --publish flag) and
# uploads its output as a workflow artifact. A single, separate `publish`
# job then downloads both artifacts and uploads everything to the release in
# one softprops/action-gh-release step. This (not two parallel publish
# steps) is deliberate: electron-builder's own GitHub publisher — and two
# jobs racing to create/update the same release — are both known to create
# duplicate/untagged releases when multiple files land at once.
#
# Why two separate mac DMGs instead of one universal build: a universal
# (arm64+x64 merged) build was tried first and consistently failed during
# electron-builder's binary-merge/codesign step on macos-latest with an
# opaque "not a file" error, unrelated to code-signing config (reproduced
# identically across multiple fix attempts). Building each architecture as
# its own DMG skips that merge step entirely and is the documented fallback
# for exactly this situation.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop-app dependencies
        working-directory: electron
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify installer filename
        shell: bash
        run: test -f "dist/RoutineQuest-Setup.exe"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/RoutineQuest-Setup.exe
            dist/RoutineQuest-Setup.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop-app dependencies
        working-directory: electron
        run: npm ci

      - name: "Build macOS installers (Apple Silicon + Intel, separate DMGs)"
        run: |
          # Without a real certificate (CSC_LINK unset), electron-builder still
          # attempts *some* default signing pass and crashes outright instead
          # of falling back to unsigned (reproduced identically across four
          # separate CI attempts: CSC_IDENTITY_AUTO_DISCOVERY=false alone did
          # not stop it — only explicitly forcing `mac.identity=null` via CLI
          # override does). That override must NOT be passed once a real
          # CSC_LINK secret exists, since identity:null unconditionally skips
          # signing regardless of any certificate — hence the branch below
          # instead of hardcoding it in package.json.
          if [ -z "$CSC_LINK" ]; then
            npm run dist:mac -- -c.mac.identity=null
          else
            npm run dist:mac
          fi
        env:
          # CSC_LINK/APPLE_* are all empty/unset unless the repo owner has
          # added them under Settings → Secrets and variables → Actions —
          # see README.md "macOS: Code-Signing & Notarisierung" for what each
          # one is.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Rename to the public filenames
        # electron-builder's ${arch} placeholder produces "arm64"/"x64";
        # renamed here to the clearer, user-facing names used on the website.
        run: |
          mv "dist/RoutineQuest-macOS-arm64.dmg" "dist/RoutineQuest-macOS-Apple-Silicon.dmg"
          mv "dist/RoutineQuest-macOS-x64.dmg" "dist/RoutineQuest-macOS-Intel.dmg"

      - name: Verify installer filenames
        run: |
          test -f "dist/RoutineQuest-macOS-Apple-Silicon.dmg"
          test -f "dist/RoutineQuest-macOS-Intel.dmg"

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/RoutineQuest-macOS-Apple-Silicon.dmg
            dist/RoutineQuest-macOS-Intel.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Upload macOS update-metadata (best effort)
        # electron-updater feed files/blockmaps — not required for the DMGs
        # themselves to be valid downloads, so this step never fails the job.
        uses: actions/upload-artifact@v4
        with:
          name: macos-update-metadata
          path: |
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: ignore
          retention-days: 1

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Download macOS build artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: dist

      - name: Download macOS update-metadata (best effort)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: macos-update-metadata
          path: dist

      - name: Publish GitHub Release (required installers)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: RoutineQuest ${{ github.ref_name }}
          files: |
            dist/RoutineQuest-Setup.exe
            dist/RoutineQuest-macOS-Apple-Silicon.dmg
            dist/RoutineQuest-macOS-Intel.dmg
          fail_on_unmatched_files: true

      - name: Attach update-metadata (best effort, missing files are fine)
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: RoutineQuest ${{ github.ref_name }}
          files: |
            dist/RoutineQuest-Setup.exe.blockmap
            dist/latest.yml
            dist/*.blockmap
            dist/latest-mac.yml
          fail_on_unmatched_files: false
